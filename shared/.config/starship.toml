"$schema" = 'https://starship.rs/config-schema.json'
add_newline = false
command_timeout = 500
# right_format = """
# $git_branch \
# $git_status
# """
right_format = """$all"""

format = """
$git_branch\
$git_status\
$line_break\
$character
"""

# # ÔØ» Ô×£
[character]
success_symbol = '[¯×Ñ](cyan)'
# success_symbol = '[ÔØ»](bold green)'
# success_symbol = '[Ô×£](bold green)'

[line_break]
disabled = true

[directory]
read_only = " ¾░î¥"
truncate_to_repo = false
truncation_length = 2
# style = "cyan bold dimmed"
style = "bright-black"

[git_branch]
symbol = "´Éÿ "
# always_show_remote = true
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "cyan"

[git_commit]
tag_symbol = ' ´ÉÆ '
tag_disabled = false
commit_hash_length = 7

[git_status]
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
untracked = "?"
conflicted = "="
deleted = "Ô£ÿ"
diverged = "Ôçò"
modified = "!"

[package]
disabled = false
symbol = "¾░Åù "

[cmd_duration]
disabled = true

[docker_context]
symbol = "´îê "

[python]
symbol = "¯êÁ "
style = "green bold"

[lua]
symbol = "¯ÿá "

[rust]
symbol = "¾▒ÿù "

[nodejs]
symbol = "¯£ÿ "

