unbind C-b
set -g prefix `
bind ` send-prefix
bind r source-file ~/.config/tmux/tmux.conf\; display-message 'sourced ~/.config/tmux/tmux.conf'
unbind '|'
bind '|' split-window -h
unbind '-'
bind '-' split-window -v
bind -n C-t new-window # ctrl+t (`-n` = no prefix)

# 1-based indexing
set -g base-index 1
set -g pane-base-index 1

# === Look & Feel ===

# True colors support
set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

# Options
set -g renumber-windows on

# Pane separators
set -g pane-border-lines simple
set -g pane-border-style fg=black,bright
set -g pane-active-border-style fg=magenta

# Status bar
set -g status-position top
set -g status-style bg=default,fg=black,bright
set -g status-left ""
# set -g status-right "#[fg=black,bright]#S"
set -g status-right ""
set -g status-justify centre
set -g window-status-format ' #W(#I) '
set -g window-status-current-format ' #W-(#I) '

# Windows button
set -g window-status-current-format '#[fg=white]●'
set -g window-status-bell-style 'fg=red,nobold'
set -g window-status-current-style "#{?window_zoomed_flag,fg=yellow,fg=magenta,nobold}"

# QoL
set -g escape-time 0
set -g mouse on
set -g repeat-time 1000
set -g history-limit 10000
